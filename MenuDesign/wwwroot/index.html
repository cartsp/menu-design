<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Explorer</title>
    <base href="/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: Fredoka (headlines) + Plus Jakarta Sans (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=block" rel="stylesheet" />

    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />

    <!-- Tailwind v4 Output -->
    <link rel="stylesheet" href="css/output.css" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MenuDesign.styles.css" rel="stylesheet" />

    <style>
        /* Hide app content until fonts are loaded to prevent FOUT and icon text flash */
        .app-hidden { opacity: 0; }
        .app-ready { opacity: 1; transition: opacity 0.3s ease-in; }

        /* Hide Material Symbols until the font is loaded — prevents icon text flash */
        .material-symbols-outlined { opacity: 0; transition: opacity 0.15s ease-in; }
        .fonts-loaded .material-symbols-outlined { opacity: 1; }
    </style>
    <script>
        document.fonts.load('24px "Material Symbols Outlined"').then(function() {
            document.documentElement.classList.add('fonts-loaded');
        });
    </script>
</head>

<body>
    <div id="app" class="app-hidden">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p style="margin-top: 1rem; opacity: 0.8; font-size: 0.875rem;">Loading Menu Explorer...</p>
        </div>
    </div>

    <script>
        // Reveal app only after all fonts (including Material Symbols) are loaded
        document.fonts.ready.then(function() {
            var app = document.getElementById('app');
            if (app) {
                app.classList.remove('app-hidden');
                app.classList.add('app-ready');
            }
        });
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script>
        // ═══ Audio — Safari-compatible pre-rendered buffer approach ═══
        // Safari refuses to play live Web Audio synthesis on non-gesture events (mouseenter).
        // Solution: render the blip into an AudioBuffer on the first real user gesture (click),
        // then replay that buffer on hover. Buffer playback doesn't require a gesture chain.

        let _audioCtx = null;
        let _hoverBuffer = null;
        let _hoverBufferLoading = false;


        function getAudioCtx() {
            if (!_audioCtx) {
                _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return _audioCtx;
        }

        // Load the hover sound into an AudioBuffer
        function loadHoverBuffer() {
            if (_hoverBuffer || _hoverBufferLoading) return;
            _hoverBufferLoading = true;
            const ctx = getAudioCtx();
            fetch('audio/click-003.mp3')
                .then(function(response) { return response.arrayBuffer(); })
                .then(function(arrayBuffer) { return ctx.decodeAudioData(arrayBuffer); })
                .then(function(buffer) {
                    _hoverBuffer = buffer;
                    console.log('[Audio] Hover sound loaded (' + buffer.duration.toFixed(3) + 's)');
                })
                .catch(function(err) {
                    console.error('[Audio] Failed to load hover sound:', err);
                    _hoverBufferLoading = false;
                });
        }

        function ensureAudioReady() {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
            loadHoverBuffer();
        }

        // Blazor-callable unlock (splash screen click)
        window.unlockAudio = function() { ensureAudioReady(); };

        // Blazor sets this to toggle sound on/off
        window._hoverSoundEnabled = true;
        window.setHoverSoundEnabled = function(enabled) { window._hoverSoundEnabled = enabled; };

        // Unlock on every possible user gesture
        document.addEventListener('mousedown', ensureAudioReady);
        document.addEventListener('touchstart', ensureAudioReady, { passive: true });
        document.addEventListener('touchend', ensureAudioReady, { passive: true });
        document.addEventListener('keydown', ensureAudioReady);

        // ═══ Play hover blip from pre-rendered buffer ═══
        function playHoverBlipFromBuffer() {
            if (!_hoverBuffer) return;
            if (!window._hoverSoundEnabled) return;

            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }

            const source = ctx.createBufferSource();
            source.buffer = _hoverBuffer;
            const gainNode = ctx.createGain();
            gainNode.gain.value = 0.06;
            source.connect(gainNode);
            gainNode.connect(ctx.destination);
            source.start(0);
        }

        // ═══ Hover sound via native JS ═══
        document.addEventListener('mouseenter', function(e) {
            if (e.target.classList && e.target.classList.contains('menu-card')) {
                playHoverBlipFromBuffer();
            }
        }, true);

        // ═══ Ripple effect on card click ═══
        window.addRipple = function(element) {
            ensureAudioReady();
            if (!element) return;
            const rect = element.getBoundingClientRect();
            const container = element.querySelector('.ripple-container');
            if (!container) return;

            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height) * 1.2;
            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (rect.width / 2 - size / 2) + 'px';
            ripple.style.top = (rect.height / 2 - size / 2) + 'px';

            container.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        };
    </script>
</body>

</html>
