name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish MenuDesign/MenuDesign.csproj -c Release -o release

      - name: Resolve static web asset aliases for GitHub Pages
        run: |
          # .NET 10 uses fingerprinted filenames and an endpoints manifest
          # for route aliases. GitHub Pages has no middleware, so we create
          # physical copies for every alias that maps to a different file.
          node -e "
            const fs = require('fs');
            const path = require('path');
            const manifest = JSON.parse(fs.readFileSync('release/MenuDesign.staticwebassets.endpoints.json','utf8'));
            const wwwroot = 'release/wwwroot';
            for (const ep of manifest.Endpoints) {
              const route = ep.Route;
              const asset = ep.AssetFile;
              // Skip if route and asset are the same (no alias needed)
              if (route === asset) continue;
              // Skip compressed variants — browsers won't request .br/.gz directly
              if (route.endsWith('.br') || route.endsWith('.gz')) continue;
              if (asset.endsWith('.br') || asset.endsWith('.gz')) continue;
              const src = path.join(wwwroot, asset);
              const dest = path.join(wwwroot, route);
              if (fs.existsSync(src) && !fs.existsSync(dest)) {
                fs.mkdirSync(path.dirname(dest), { recursive: true });
                fs.copyFileSync(src, dest);
                console.log(route + ' -> ' + asset);
              }
            }
          "

      - name: Rewrite base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/menu-design/" />|g' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
